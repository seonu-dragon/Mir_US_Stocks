name: Activist stakes (SEC 13D/G)

on:
  schedule:
    - cron: "28 4 * * *"  # 04:28 UTC (KST 13:28)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  activist:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build activist stakes
        run: python scripts/build_activist_stakes.py --backfill-days 21 --push
