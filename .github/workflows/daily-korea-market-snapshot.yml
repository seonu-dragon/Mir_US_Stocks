name: Daily Korea market snapshot

on:
  # Primary path: korea-close-briefing.yml runs this script at 15:42 KST.
  # Keep manual trigger for recovery when the afternoon schedule is missed.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-actions.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-actions.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Korea market snapshot
        run: python scripts/update_korea_data.py --push