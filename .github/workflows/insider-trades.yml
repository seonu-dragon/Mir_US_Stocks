name: Insider trades (SEC Form 4)

on:
  schedule:
    - cron: "17 4 * * *"  # 04:17 UTC ≈ 미국 장 마감·공시 마감 후 (KST 13:17)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  insider:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build insider trades
        run: python scripts/build_insider_trades.py --top 1000 --backfill-days 45 --push
