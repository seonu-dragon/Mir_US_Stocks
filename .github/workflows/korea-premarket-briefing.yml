name: Korea premarket briefing

on:
  schedule:
    - cron: "6 21 * * *"  # 06:06 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-actions.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-actions.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Korea premarket briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: scripts/briefings/korea_premarket
        run: python main.py
