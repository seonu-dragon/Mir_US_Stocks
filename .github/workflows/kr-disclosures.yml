name: KR DART disclosures

on:
  schedule:
    - cron: "30 6 * * 1-5"  # 15:30 KST weekdays
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-actions.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-actions.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build KR disclosures
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/build_kr_disclosures.py --push