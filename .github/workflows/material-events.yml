name: Material events (SEC 8-K)

on:
  schedule:
    - cron: "23 4 * * *"  # 04:23 UTC (KST 13:23)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  events:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build material events
        run: python scripts/build_material_events.py --backfill-days 14 --top 1500 --push
