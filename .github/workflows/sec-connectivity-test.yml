name: SEC connectivity test

# 1회성 진단: GitHub Actions 러너에서 SEC Archives(Form 4 XML 호스트)에
# 브라우저 헤더(Sec-Fetch-*, sec-ch-ua)를 보내면 접근 가능한지 확인한다.
# PASS면 내부자 거래 빌드를 Actions에서 그대로 돌릴 수 있다. 확인 후 삭제 예정.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Probe SEC Archives with browser headers
        run: |
          python - <<'PY'
          import json, gzip, urllib.request, urllib.error

          # Akamai 봇 매니저를 통과하려면 브라우저처럼 Sec-Fetch-*/sec-ch-ua 를 보내야 한다.
          HEADERS = {
              "User-Agent": ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                             "AppleWebKit/537.36 (KHTML, like Gecko) "
                             "Chrome/124.0.0.0 Safari/537.36"),
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "Accept-Encoding": "gzip, deflate",
              "sec-ch-ua": '"Chromium";v="124", "Google Chrome";v="124", "Not-A.Brand";v="99"',
              "sec-ch-ua-mobile": "?0",
              "sec-ch-ua-platform": '"Windows"',
              "Sec-Fetch-Dest": "document",
              "Sec-Fetch-Mode": "navigate",
              "Sec-Fetch-Site": "none",
              "Sec-Fetch-User": "?1",
              "Upgrade-Insecure-Requests": "1",
          }

          def get(url, raw=False):
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = r.read()
                  if r.headers.get("Content-Encoding") == "gzip":
                      data = gzip.decompress(data)
                  return (r.status, data if raw else len(data))

          print("=== Archives reachability (browser headers) ===")
          for url in (
              "https://www.sec.gov/Archives/edgar/full-index/2024/QTR1/",
              "https://www.sec.gov/Archives/edgar/daily-index/2024/QTR1/",
          ):
              try:
                  st, ln = get(url)
                  print(f"  {st}  bytes~{ln}  {url}")
              except urllib.error.HTTPError as e:
                  print(f"  {e.code}  (blocked)  {url}")
              except Exception as e:
                  print(f"  ERR {type(e).__name__}  {url}")

          # End-to-end: efts 검색 → Archives Form 4 XML 실제 fetch (빌드와 동일 동작)
          print("\n=== End-to-end Form 4 fetch+parse ===")
          archives_ok = False
          try:
              j = json.loads(get("https://efts.sec.gov/LATEST/search-index?q=&forms=4", raw=True)[1])
              hit = j["hits"]["hits"][0]
              acc, doc = hit["_id"].split(":")
              src = hit.get("_source", {})
              print(f"  hit: {hit['_id']} ({src.get('file_date')}) {src.get('display_names')}")
              for cik in src.get("ciks", []):
                  url = f"https://www.sec.gov/Archives/edgar/data/{int(cik)}/{acc.replace('-','')}/{doc}"
                  try:
                      st, body = get(url, raw=True)
                      print(f"  {st}  {url}")
                      if st == 200:
                          import xml.etree.ElementTree as ET
                          root = ET.fromstring(body)
                          sym = root.findtext("issuer/issuerTradingSymbol")
                          n = len(root.findall("nonDerivativeTable/nonDerivativeTransaction"))
                          print(f"  PARSED: issuer={sym}, nonDerivative tx={n}")
                          archives_ok = True
                          break
                  except urllib.error.HTTPError as e:
                      print(f"  {e.code}  {url}")
          except Exception as e:
              print(f"  e2e failed: {type(e).__name__}: {e}")

          print("\n=== VERDICT ===")
          if archives_ok:
              print("  PASS: Form 4 XML reachable+parseable from Actions with browser headers.")
              print("        → 내부자 거래 빌드를 GitHub Actions에서 자동 실행 가능.")
          else:
              print("  FAIL: still blocked → 사용자 PC 로컬 실행으로 진행.")
          PY
