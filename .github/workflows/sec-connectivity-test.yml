name: SEC connectivity test

# 1회성 진단: GitHub Actions 러너에서 SEC 호스트(특히 Form 4 XML이 있는
# www.sec.gov/Archives)에 접근 가능한지 확인한다. 결과에 따라 내부자 거래
# 빌드를 Actions에서 돌릴지(가능) 사용자 PC 로컬에서 돌릴지(403) 결정.
# 확인이 끝나면 이 파일은 삭제해도 된다.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Probe SEC hosts
        run: |
          python - <<'PY'
          import json, urllib.request, urllib.error

          SEC_UA = "Mir US Stocks mir-us-stocks@users.noreply.github.com"
          BROWSER_UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                        "AppleWebKit/537.36 (KHTML, like Gecko) "
                        "Chrome/124.0.0.0 Safari/537.36")

          def probe(url, ua, accept="*/*"):
              req = urllib.request.Request(url, headers={
                  "User-Agent": ua,
                  "Accept-Encoding": "gzip, deflate",
                  "Accept": accept,
              })
              try:
                  with urllib.request.urlopen(req, timeout=25) as r:
                      body = r.read(400)
                      return r.status, len(body)
              except urllib.error.HTTPError as e:
                  return e.code, 0
              except Exception as e:
                  return f"ERR:{type(e).__name__}", 0

          targets = [
              ("data.sec.gov submissions", "https://data.sec.gov/submissions/CIK0000320193.json"),
              ("efts full-text search",    "https://efts.sec.gov/LATEST/search-index?q=Apple&forms=4"),
              ("ARCHIVES full-index dir",  "https://www.sec.gov/Archives/edgar/full-index/2024/QTR1/"),
              ("ARCHIVES form.idx file",   "https://www.sec.gov/Archives/edgar/full-index/2024/QTR1/form.idx"),
          ]

          print("=== Host reachability (SEC-declared UA / browser UA) ===")
          for name, url in targets:
              s1 = probe(url, SEC_UA)
              s2 = probe(url, BROWSER_UA)
              print(f"  {name:28} SEC-UA={s1}  BROWSER-UA={s2}")

          # End-to-end: the exact operation the real build performs.
          print("\n=== End-to-end Form 4 fetch (Apple CIK 320193) ===")
          archives_ok = False
          import gzip
          def fetch_json(url):
              for ua in (BROWSER_UA, SEC_UA):
                  req = urllib.request.Request(url, headers={
                      "User-Agent": ua, "Accept-Encoding": "gzip, deflate"})
                  try:
                      with urllib.request.urlopen(req, timeout=25) as r:
                          raw = r.read()
                          if r.headers.get("Content-Encoding") == "gzip":
                              raw = gzip.decompress(raw)
                          return json.loads(raw)
                  except Exception:
                      continue
              raise RuntimeError("all UAs failed")
          try:
              data = fetch_json("https://data.sec.gov/submissions/CIK0000320193.json")
              recent = data["filings"]["recent"]
              forms = recent["form"]; accs = recent["accessionNumber"]
              docs = recent["primaryDocument"]; dates = recent["filingDate"]
              idx = next((i for i, f in enumerate(forms) if f == "4"), None)
              if idx is None:
                  print("  No Form 4 found in recent submissions.")
              else:
                  acc_nodash = accs[idx].replace("-", "")
                  doc = docs[idx]
                  xml_url = f"https://www.sec.gov/Archives/edgar/data/320193/{acc_nodash}/{doc}"
                  print(f"  Latest Form 4: {accs[idx]} ({dates[idx]}) doc={doc}")
                  print(f"  Fetching: {xml_url}")
                  for ua_name, ua in (("SEC-UA", SEC_UA), ("BROWSER-UA", BROWSER_UA)):
                      st, ln = probe(xml_url, ua, accept="application/xml,text/xml,*/*")
                      print(f"    {ua_name}: status={st} bytes~{ln}")
                      if st == 200:
                          archives_ok = True
          except Exception as e:
              print(f"  submissions step failed: {type(e).__name__}: {e}")

          print("\n=== VERDICT ===")
          if archives_ok:
              print("  PASS: Archives Form 4 XML is reachable from Actions → SEC build can run on GitHub Actions.")
          else:
              print("  FAIL: Archives blocked (403) from Actions → run the SEC build on the user's PC instead.")
          PY
