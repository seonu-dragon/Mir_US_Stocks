name: Weekly earnings history refresh

on:
  schedule:
    - cron: "2 18 * * 6"  # 일요일 03:02 KST (UTC 토요일 18:02)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mir-data-publish
  cancel-in-progress: false

jobs:
  earnings:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-actions.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-actions.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Incremental earnings history refresh
        run: python scripts/earnings_history_store.py --resume