<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiwoom Chart Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    #chart-capture-area {
      width: 960px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
    }
    .capture-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .capture-head h1 { font-size: 20px; font-weight: 700; }
    .capture-head p { font-size: 13px; color: #94a3b8; }
    #captureChart { width: 100%; display: block; }
    .capture-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 10px;
      font-size: 11px;
      color: #94a3b8;
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .status { margin-top: 8px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div id="chart-capture-area" data-ready="0">
    <div class="capture-head">
      <div>
        <h1 id="captureTitle">—</h1>
        <p id="captureMeta">차트 로딩 중…</p>
      </div>
      <p id="capturePeriod">6M · 일봉 · 상승확률 분석</p>
    </div>
    <svg id="captureChart" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="capture-legend">
      <span><i class="legend-dot" style="background:#a855f7"></i>SMA20</span>
      <span><i class="legend-dot" style="background:#d98a2b"></i>SMA60</span>
      <span><i class="legend-dot" style="background:#16a34a"></i>지지</span>
      <span><i class="legend-dot" style="background:#dc2626"></i>저항</span>
      <span><i class="legend-dot" style="background:#4ade80"></i>지지 추세선</span>
      <span><i class="legend-dot" style="background:#f87171"></i>저항 추세선</span>
      <span><i class="legend-dot" style="background:#0ea5e9"></i>차트 패턴</span>
    </div>
    <p class="status" id="captureStatus">준비 중</p>
  </div>
  <script src="analysis.js"></script>
  <script src="chart_capture.js"></script>
</body>
</html>
